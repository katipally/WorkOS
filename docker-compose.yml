services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - WORKOS_OLLAMA_URL=http://host.docker.internal:11434
      - WORKOS_DATABASE_PATH=/app/data/workos.db
      - WORKOS_CORS_ORIGINS=["http://localhost","http://localhost:3000","http://localhost:3001","http://localhost:80"]
    volumes:
      - backend-data:/app/data
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  backend-data:
